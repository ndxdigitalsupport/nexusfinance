services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexusfinance-sandbox
    ports:
      - "4001:3001"
    env_file:
      - docker-compose.env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
