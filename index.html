<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F171C" />
    <meta name="telegram:mini-app" content="true" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    <title>Nexusfinance — Smart Lending Platform</title>
    <script>
      window.onerror = function(msg, url, line, col, err) {
        fetch('/api/health-error', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({msg: msg, url: url, line: line, col: col, stack: err?.stack}) });
      };
      window.addEventListener('unhandledrejection', function(e) {
        fetch('/api/health-error', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({msg: e.reason?.message || String(e.reason), stack: e.reason?.stack}) });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
